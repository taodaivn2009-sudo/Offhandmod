on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target_type:
          - client
    steps:
      - uses: actions/checkout@v4

      - uses: xmake-io/github-action-setup-xmake@v1

      - uses: actions/cache@v3
        with:
          path: |
            ~/.xmake
          key: xmake-${{ hashFiles('xmake.lua') }}
          restore-keys: |
            xmake-

      - run: |
          xmake repo -u

      - name: Configure xmake for Android
        run: |
          xmake f -a arm64-v8a -m release -p android --ndk=$ANDROID_NDK_LATEST_HOME -v --target_type=${{ matrix.target_type }} -y

      - name: Build Mod
        run: |
          xmake -v -y

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-${{ github.sha }}-${{ matrix.target_type }}-android-arm64
          path: |
            bin/
